<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darshh Builders - Management System Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            750: '#2d3748', 
                            850: '#1a202c', 
                            900: '#171923', 
                            950: '#0f1115', 
                        },
                        blue: {
                            450: '#3182ce', 
                            950: '#2a4365', 
                        },
                        emerald: {
                            450: '#38b2ac', 
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-850 text-gray-300 font-sans text-sm h-screen flex items-center justify-center overflow-hidden">

    <!-- Login Container -->
    <div class="w-full max-w-md px-6">
        
        <!-- Brand Header -->
        <div class="flex flex-col items-center justify-center mb-8 gap-3">
            <div class="bg-blue-600 p-3 rounded-xl shadow-lg shadow-blue-900/20">
               <i data-lucide="building-2" class="w-8 h-8 text-white"></i>
            </div>
            <div class="text-center">
                <h1 class="font-bold text-white text-2xl tracking-tight">Darshh Builders</h1>
                <span class="text-xs text-gray-400 uppercase tracking-wider">CONSTRUCTIONS MANAGEMENT NETWORK</span>
            </div>
        </div>

        <!-- Login Card -->
        <div class="bg-gray-900 border border-gray-800 rounded-lg shadow-2xl overflow-hidden p-8">
            <h2 class="text-lg font-semibold text-white mb-6">Sign in to your account</h2>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label for="email" class="block text-xs font-medium text-gray-400 mb-1.5">Email / Mobile Number</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                        <input type="text" id="email" placeholder="admin@darshh.com" 
                            class="w-full bg-gray-850 border border-gray-700 text-gray-300 text-sm rounded-md pl-9 pr-3 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-gray-600">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label for="password" class="block text-xs font-medium text-gray-400">Password</label>
                        <a href="#" class="text-xs text-blue-400 hover:text-blue-300 hover:underline">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                        <input type="password" id="password" placeholder="••••••••" 
                            class="w-full bg-gray-850 border border-gray-700 text-gray-300 text-sm rounded-md pl-9 pr-3 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-gray-600">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full px-4 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-md flex justify-center items-center gap-2 transition-colors shadow-sm">
                        Sign In <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </form>

            <div class="mt-6 flex items-center justify-center gap-4">
                <hr class="w-full border-gray-800">
                <span class="text-xs text-gray-500 whitespace-nowrap">Or continue with</span>
                <hr class="w-full border-gray-800">
            </div>

            <div class="mt-6">
                <button id="googleSignInBtn" class="w-full px-4 py-2.5 bg-gray-850 border border-gray-700 hover:bg-gray-800 text-gray-300 hover:text-white text-sm font-medium rounded-md flex justify-center items-center gap-3 transition-colors">
                    <!-- Standard Google G SVG -->
                    <svg class="w-4 h-4" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Sign in with Google
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-xs text-gray-600">
            &copy; 2026 Darshh Builders. All rights reserved. Version 1.0.1
        </div>
    </div>

    <!-- Custom Animated Modal -->
    <div id="authModal" class="fixed inset-0 bg-black/60 z-50 hidden flex-col items-center justify-center backdrop-blur-sm transition-opacity opacity-0 duration-300">
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-8 flex flex-col items-center justify-center gap-4 shadow-xl transform scale-95 transition-transform duration-300 relative w-80 h-52 max-w-[90vw]" id="modalCard">
            <button id="closeModalBtn" class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors focus:outline-none" title="Close">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <i data-lucide="loader-2" id="modalIcon" class="w-10 h-10 text-blue-500 animate-spin"></i>
            <div class="flex flex-col items-center gap-1">
                <p class="text-white font-medium text-base text-center leading-tight" id="modalText">Signing you in...</p>
                <p class="text-gray-400 text-sm text-center hidden" id="modalSubText"></p>
            </div>
        </div>
    </div>

    <script type="module">
        // Initialize Lucide Icons
        lucide.createIcons();

        // Import Firebase v9 Modular SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB03Ak6YUzLsYiq01LVB3w8Akmj9ekdCT4",
            authDomain: "msk-darshh.firebaseapp.com",
            projectId: "msk-darshh",
            storageBucket: "msk-darshh.firebasestorage.app",
            messagingSenderId: "518953177808",
            appId: "1:518953177808:web:36f38487a84e88243204d5",
            measurementId: "G-P0DDQSG0ZW"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Endpoint Definition
        const API_ENDPOINT = 'https://api.zlabz.space/webservices/v1/access/getAdminAccessToken';

        // UI Elements
        const loginForm = document.getElementById('loginForm');
        const googleBtn = document.getElementById('googleSignInBtn');
        const modal = document.getElementById('authModal');
        const modalCard = document.getElementById('modalCard');
        const modalText = document.getElementById('modalText');
        const modalSubText = document.getElementById('modalSubText');
        const modalIcon = document.getElementById('modalIcon');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // Modal Controller
        const toggleModal = (show, text = 'Signing you in...', isError = false, isSuccess = false, subText = '') => {
            if (show) {
                modalText.textContent = text;
                
                if (subText) {
                    modalSubText.textContent = subText;
                    modalSubText.classList.remove('hidden');
                } else {
                    modalSubText.classList.add('hidden');
                }
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                modalIcon.classList.remove('animate-spin', 'text-blue-500', 'text-red-500', 'text-emerald-450');
                
                if (isError) {
                    modalIcon.setAttribute('data-lucide', 'x-circle');
                    modalIcon.classList.add('text-red-500');
                } else if (isSuccess) {
                    modalIcon.setAttribute('data-lucide', 'check-circle');
                    modalIcon.classList.add('text-emerald-450');
                } else {
                    modalIcon.setAttribute('data-lucide', 'loader-2');
                    modalIcon.classList.add('animate-spin', 'text-blue-500');
                }
                
                lucide.createIcons();

                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalCard.classList.remove('scale-95');
                    modalCard.classList.add('scale-100');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                modalCard.classList.add('scale-95');
                modalCard.classList.remove('scale-100');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex'); 
                    modalSubText.classList.add('hidden');
                    
                    modalIcon.setAttribute('data-lucide', 'loader-2');
                    modalIcon.classList.add('animate-spin', 'text-blue-500');
                    modalIcon.classList.remove('text-red-500', 'text-emerald-450');
                    lucide.createIcons();
                }, 300);
            }
        };

        closeModalBtn.addEventListener('click', () => {
            toggleModal(false);
        });

        // Shared function to handle the JSON array response from your backend
        const processApiResponse = async (response, displayUser) => {
            const rawText = await response.text();
            let dataArr;
            
            try {
                dataArr = JSON.parse(rawText);
            } catch(e) {
                throw new Error("Invalid server response format.");
            }

            // Endpoint returns an array containing the response object
            const data = Array.isArray(dataArr) ? dataArr[0] : dataArr;

            if (response.ok && data && data.Status === 1) {
                // Save custom obfuscated tokens to Local Storage
                localStorage.setItem('u_x6yEui0t', data.Profile_ID);
                localStorage.setItem('g_3b7z1kw', data.Usr_Grp);
                localStorage.setItem('at_ki8Xq1iV', data.Access_Token);

                // Show success modal with Green Checkmark and subtext
                toggleModal(true, `Welcome back, ${displayUser}!`, false, true, 'Redirecting You..');
                
                // Redirect logic
                setTimeout(() => { window.location.href = 'app/admin/'; }, 1500);
            } else {
                throw new Error(data.Message || 'Server rejected authentication.');
            }
        };

        // SCENARIO 2: Username + Password Credentials Flow
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const mobEmail = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if(!mobEmail || !password) {
                toggleModal(true, "Please enter both your email/mobile and password.", true);
                return;
            }

            toggleModal(true, 'Authenticating credentials...', false, false);

            try {
                // Encryption key
                const key = "XRD4G-YAN1W-BO0LV-YFTNW-VXQ7W";
                
                // Create exactly the JSON payload requested
                const payloadStr = '{"Mob":"' + mobEmail + '","Pwd":"' + password + '"}';
                
                // Encrypt payload via CryptoJS AES
                const ciphertext = CryptoJS.AES.encrypt(payloadStr, key);
                const cipherString = ciphertext.toString();

                // Create FormData payload
                const formData = new FormData();
                formData.append('auth_type', 'credentials');
                formData.append('token', cipherString);

                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    body: formData
                });

                await processApiResponse(response, mobEmail.split('@')[0] || 'User');

            } catch (error) {
                console.error("Credentials Auth Error:", error);
                toggleModal(true, error.message || "Authentication failed.", true);
            }
        });

        // SCENARIO 1: Google Auth Flow
        googleBtn.addEventListener('click', async () => {
            try {
                // 1. Authenticate with Google
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const idToken = await user.getIdToken();
                
                toggleModal(true, 'Verifying with server...', false, false);

                // 2. Create FormData payload
                const formData = new FormData();
                formData.append('auth_type', 'google');
                formData.append('idtoken', idToken);
                
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    body: formData
                });

                await processApiResponse(response, user.displayName || user.email || 'User');

            } catch (error) {
                console.error("Google Auth Error:", error);
                
                if (error.code !== 'auth/popup-closed-by-user') {
                    toggleModal(true, error.message || "Authentication failed.", true);
                }
            }
        });
    </script>
</body>
</html>
