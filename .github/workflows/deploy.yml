name: Deploy Next.js Static Export via FTP

on:
  push:
    branches:
      - master
      - staging

jobs:
  build:
    name: Build Next.js Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Update if using a different Node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project (Static Export)
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-output
          path: out/
          retention-days: 1 # We only need it for the deploy job

  deploy:
    name: Sync to FTP Server
    needs: build
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref_name == 'master' && 'production' || 'staging' }}
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build-output
          path: out/

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./ # Change this if you want to deploy to a specific subfolder on the server
