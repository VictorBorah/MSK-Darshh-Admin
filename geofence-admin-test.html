<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Construction Site Geofence Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Leaflet Draw -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #toolbar {
      padding: 10px;
      background: #1f2937;
      color: #fff;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #toolbar input {
      padding: 6px;
      width: 300px;
    }

    #toolbar button {
      padding: 6px 12px;
      cursor: pointer;
    }

    #map {
      width: 100%;
      height: calc(100vh - 52px);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #fff;
      width: 80%;
      max-width: 700px;
      padding: 20px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-content h3 {
      margin: 0;
    }

    .modal-content textarea {
      width: 100%;
      height: 260px;
      font-family: monospace;
      font-size: 13px;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
    }

    .modal-actions button {
      padding: 8px 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <input type="text" id="search" placeholder="Search address / landmark">
  <button onclick="searchAddress()">Search</button>
  <button onclick="openExportModal()">Export Geofence</button>
</div>

<div id="map"></div>

<!-- Modal -->
<div id="exportModal" class="modal">
  <div class="modal-content">
    <h3>Export Geofence (GeoJSON)</h3>
    <textarea id="geojsonOutput" readonly></textarea>
    <div class="modal-actions">
      <button onclick="closeModal()">Close</button>
      <button>Save Geofence</button>
    </div>
  </div>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet Draw -->
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>
  // Initialize map
  const map = L.map('map', { maxZoom: 22 })
    .setView([26.1445, 91.7362], 18); // Assam default

  // Esri World Imagery
  const esriSatellite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {
      maxZoom: 22,
      attribution: 'Tiles © Esri'
    }
  ).addTo(map);

  // Optional OSM labels overlay
  const osmLabels = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom: 22, opacity: 0.4 }
  );

  L.control.layers({
    "Satellite": esriSatellite,
    "Hybrid (Satellite + Labels)": L.layerGroup([esriSatellite, osmLabels])
  }).addTo(map);

  // Feature group for geofence
  const drawnItems = new L.FeatureGroup();
  map.addLayer(drawnItems);

  // Draw controls
  const drawControl = new L.Control.Draw({
    edit: { featureGroup: drawnItems },
    draw: {
      polygon: {
        allowIntersection: false,
        showArea: true
      },
      polyline: false,
      rectangle: false,
      circle: false,
      marker: false,
      circlemarker: false
    }
  });

  map.addControl(drawControl);

  // Handle polygon creation
  map.on(L.Draw.Event.CREATED, function (e) {
    drawnItems.clearLayers();
    drawnItems.addLayer(e.layer);
  });

  // Address search (Nominatim)
  async function searchAddress() {
    const query = document.getElementById('search').value;
    if (!query) return;

    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`
    );
    const data = await res.json();

    if (data.length > 0) {
      map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 20);
    } else {
      alert("Location not found");
    }
  }

  // Modal handling
  function openExportModal() {
    if (drawnItems.getLayers().length === 0) {
      alert("Please draw a geofence polygon first.");
      return;
    }

    const geojson = drawnItems.toGeoJSON();
    document.getElementById('geojsonOutput').value =
      JSON.stringify(geojson, null, 2);

    document.getElementById('exportModal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('exportModal').style.display = 'none';
  }

  // Close modal on outside click
  document.getElementById('exportModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>

</body>
</html>
